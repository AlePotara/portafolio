<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora Web - Proyecto de Alejandro Maidana">
  <meta name="author" content="Alejandro Maidana">
  <title>Calculadora Web | Alejandro Maidana</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link href="css/estilos.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">

  <header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="bi bi-code-slash text-primary"></i> Mi Portafolio
        </a>
        <a href="index.html#proyectos" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-arrow-left"></i> Volver al portafolio
        </a>
      </div>
    </nav>
  </header>

  <main class="d-flex align-items-center" style="min-height: 100vh; padding-top: 72px;">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <h1 class="text-center fw-bold mb-4 h3">
            <i class="bi bi-calculator text-primary"></i> Calculadora Web
          </h1>
          <div class="card shadow border-0">
            <div class="card-body p-4">

              <!-- Pantalla -->
              <input type="text" id="pantalla" class="form-control pantalla-calc mb-3" value="0" readonly aria-label="Pantalla de la calculadora">

              <!-- Botones -->
              <div class="row g-2">
                <div class="col-3"><button class="btn btn-outline-danger w-100 btn-calc" onclick="limpiar()">C</button></div>
                <div class="col-3"><button class="btn btn-outline-secondary w-100 btn-calc" onclick="borrarUltimo()"><i class="bi bi-backspace"></i></button></div>
                <div class="col-3"><button class="btn btn-outline-secondary w-100 btn-calc" onclick="agregar('%')">%</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="agregar('/')">÷</button></div>

                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('7')">7</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('8')">8</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('9')">9</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="agregar('*')">×</button></div>

                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('4')">4</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('5')">5</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('6')">6</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="agregar('-')">−</button></div>

                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('1')">1</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('2')">2</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('3')">3</button></div>
                <div class="col-3"><button class="btn btn-warning w-100 btn-calc" onclick="agregar('+')">+</button></div>

                <div class="col-6"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('0')">0</button></div>
                <div class="col-3"><button class="btn btn-light border w-100 btn-calc" onclick="agregar('.')">.</button></div>
                <div class="col-3"><button class="btn btn-primary w-100 btn-calc" onclick="calcular()">=</button></div>
              </div>

            </div>
          </div>
          <p class="text-center text-body-secondary small mt-3">
            Proyecto desarrollado con HTML, CSS, Bootstrap y JavaScript.
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-dark text-white text-center">
    <div class="container">
      <p class="mb-0">© <span id="anio"></span> Alejandro Maidana — Calculadora Web</p>
    </div>
  </footer>

  <!-- Bootstrap JS (bundle con Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script de la calculadora -->
  <script src="js/calculadora.js"></script>
</body>
</html>
